name: spectral160-presskit

services:
  web:
    build: .
    image: spectral160-presskit:latest
    container_name: spectral160-presskit
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      com.docker.compose.project: spectral160-presskit
      com.spectral160.description: Spectral160 press kit static site
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
