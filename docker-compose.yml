name: spectral160-presskit

services:
  web:
    image: caddy:2-alpine
    container_name: spectral160-presskit
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./spectral160-presskit:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    labels:
      com.spectral160.description: Spectral160 press kit static site
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
